<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Bejelentkezés - Jázmin Lovasudvar</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #2e7d32;
            --bg-gradient-start: #2e7d32;
            --bg-gradient-end: #1b5e20;
            --white: #ffffff;
            --error-red: #c0392b;
            --success-green: #27ae60;
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow: hidden;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .login-box {
            background: var(--white);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo { 
            font-size: 48px; 
            margin-bottom: 10px; 
            display: block;
        }
        
        h1 { 
            color: var(--dark-green); 
            font-size: 24px; 
            margin-bottom: 5px; 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 700;
        }
        
        .subtitle { 
            color: #666; 
            font-size: 13px; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 600;
        }
        
        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--dark-green); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 14px; 
            font-family: 'Poppins', sans-serif; 
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        input:focus { 
            outline: none; 
            border-color: var(--dark-green); 
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1); 
        }
        
        input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: var(--dark-green); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 14px; 
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-login:hover:not(:disabled) { 
            opacity: 0.9; 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.3); 
        }
        
        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn-login:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        
        .spinner { 
            display: none; 
            width: 16px; 
            height: 16px; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-top-color: white; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        
        .spinner.active {
            display: inline-block;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        .error-msg { 
            color: var(--error-red); 
            font-size: 13px; 
            margin-top: 15px; 
            padding: 12px;
            background: #fadbd8;
            border-radius: 8px;
            display: none; 
            text-align: left;
            border-left: 4px solid var(--error-red);
        }
        
        .error-msg.active {
            display: block;
        }
        
        .success-msg { 
            color: var(--success-green); 
            font-size: 13px; 
            margin-top: 15px; 
            padding: 12px;
            background: #d5f4e6;
            border-radius: 8px;
            display: none; 
            text-align: left;
            border-left: 4px solid var(--success-green);
        }
        
        .success-msg.active {
            display: block;
        }
        
        #toast { 
            display: none; 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            padding: 16px 24px; 
            border-radius: 12px; 
            color: white; 
            z-index: 2000; 
            background: var(--dark-green);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
            line-height: 1.5;
        }

        .back-to-site {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-green);
            text-decoration: none;
            border: 1.5px solid var(--dark-green);
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }
        .back-to-site:hover {
            background: var(--dark-green);
            color: #fff;
        }
        
        @media (max-width: 600px) {
            .login-box { 
                padding: 30px; 
            }
            .logo {
                font-size: 40px;
            }
            h1 { 
                font-size: 20px; 
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <span class="logo">🐴</span>
        <h1>Jázmin Lovasudvar</h1>
        <p class="subtitle">Admin Bejelentkezés</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email cím</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="admin@jazminlovasudvar.hu" 
                    required
                    autocomplete="email"
                    aria-label="Email cím">
            </div>

            <div class="form-group">
                <label for="password">Jelszó</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••" 
                    required
                    autocomplete="current-password"
                    aria-label="Jelszó">
            </div>

            <button type="submit" class="btn-login" id="loginBtn" aria-label="Bejelentkezés gomb">
                <span class="spinner" id="spinner"></span>
                <span>🔐 Bejelentkezés</span>
            </button>

            <div class="error-msg" id="errorMsg" role="alert"></div>
            <div class="success-msg" id="successMsg" role="status"></div>
        </form>

        <p class="info-text">🔒 Biztonságos bejelentkezés Supabase Auth-al<br>RLS-sel védett adatbázis</p>

        <a href="index.html" class="back-to-site">🏠 Vissza a weboldalra</a>
    </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<!-- ✅ SUPABASE JS CLIENT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ✅ JAVÍTOTT SUPABASE CONFIG
    const SUPABASE_URL = "https://ktzlczqhqnuluyuedhot.supabase.co";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0emxjenFocW51bHV5dWVkaG90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjgxMjEsImV4cCI6MjA5NDEwNDEyMX0.yfNCvcMbSIWcrmyInCQo-1LX7Z4w5kT5drNxe6kfBSk";
    
    // ✅ SUPABASE KLIENS INICIALIZÁLÁSA
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, API_KEY);

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');

    if (loginForm) {
        loginForm.addEventListener('submit', handleLogin);
    }

    async function handleLogin(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // UI: loading state
        loginBtn.disabled = true;
        spinner.classList.add('active');
        document.getElementById('errorMsg').classList.remove('active');
        document.getElementById('successMsg').classList.remove('active');

        try {
            console.log("📝 Bejelentkezési kísérlet:", email);

            // ✅ JAVÍTÁS: SUPABASE SDK signInWithPassword() 
            // Ez automatikusan szinkronizálja a session-t az auth-system.js-sel!
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                console.error("❌ Auth hiba:", error.message);
                
                let errorMsg = "❌ ";
                if (error.message.includes('Invalid login credentials')) {
                    errorMsg += "Hibás email vagy jelszó!";
                } else if (error.message.includes('Email not confirmed')) {
                    errorMsg += "Az email-t még nem erősítettél meg!";
                } else if (error.message.includes('Too many requests')) {
                    errorMsg += "Túl sok próbálkozás! Később próbálkozz!";
                } else {
                    errorMsg += error.message;
                }
                
                showError(errorMsg);
                return;
            }

            if (!data.session) {
                console.error("❌ Nincs session!");
                showError("❌ Bejelentkezési hiba - session nem jott!");
                return;
            }

            console.log("✅ Bejelentkezés sikeres!");
            console.log("👤 Felhasználó:", data.session.user.email);
            
            showSuccess("✅ Sikeres bejelentkezés! Átirányítás...");

            // 1.2 másodperc után redirect az admin.html-re
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1200);

        } catch (err) {
            console.error("❌ Kritikus hálózati hiba:", err.message);
            showError("❌ Hálózati hiba a bejelentkezés során!");
        } finally {
            loginBtn.disabled = false;
            spinner.classList.remove('active');
        }
    }

    function showError(msg) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = msg;
        errorMsg.classList.add('active');
        console.error(msg);
    }

    function showSuccess(msg) {
        const successMsg = document.getElementById('successMsg');
        successMsg.textContent = msg;
        successMsg.classList.add('active');
        console.log(msg);
    }

    // ✅ AUTOMATIKUS ÁTIRÁNYÍTÁS, HA MÁR BE VAN JELENTKEZVE
    async function checkExistingSession() {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                console.log("✅ Session már létezik - redirect admin.html");
                window.location.href = 'admin.html';
            }
        } catch (err) {
            console.log("⚠️ Session check hiba (ok):", err.message);
        }
    }

    document.addEventListener('DOMContentLoaded', checkExistingSession);

    // ✅ INAKTIVITÁS MIATTI KILÉPÉS ÜZENETE
    document.addEventListener('DOMContentLoaded', () => {
        try {
            if (sessionStorage.getItem('logout_reason') === 'inactivity') {
                sessionStorage.removeItem('logout_reason');
                const errorMsg = document.getElementById('errorMsg');
                if (errorMsg) {
                    errorMsg.textContent = '⏱️ A munkameneted 15 perc inaktivitás miatt lejárt. Kérjük, lépj be újra.';
                    errorMsg.classList.add('active');
                }
            }
        } catch (e) { /* sessionStorage nem elérhető – nem kritikus */ }
    });

    // ✅ ENTER GOMB KEZELÉSE
    const passwordInput = document.getElementById('password');
    if (passwordInput) {
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    }

    console.log("✅ admin-login.js JAVÍTOTT verzió betöltödött!");
</script>

</body>
</html>
